<!DOCTYPE html>
<html>

<head>
  <link rel="icon" id="favicon" href="/logo.jpg" type="image/jpg" />
  <script>
    // Dynamically crop the favicon into a circle
    (function () {
      const img = new Image();
      img.src = '/logo.jpg';
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.beginPath();
        ctx.arc(img.width / 2, img.height / 2, Math.min(img.width, img.height) / 2, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(img, 0, 0);
        const link = document.getElementById('favicon');
        if (link) {
          link.type = 'image/png';
          link.href = canvas.toDataURL('image/png');
        }
      };
    })();
  </script>

<body class="bg-gradient-to-br from-slate-900 via-purple-900/30 to-slate-900 text-white min-h-screen">
  <div id="root"></div>

  <script>
    const { useState, useEffect, useCallback, useRef } = React;
    const { BrowserRouter, Routes, Route, Link, useParams, useNavigate } = ReactRouterDOM;

    // Navbar Component with Perfect Scroll Effects
    function Navbar({ filter, setFilter, search, setSearch, stats, scrollDirection, isScrolled }) {
      return (
        <header className={`
          fixed top-0 left-0 right-0 z-50 transition-all duration-300 ease-out backdrop-blur-xl
          ${isScrolled ? 'py-3 shadow-2xl bg-black/80 border-b border-purple-500/50' : 'py-6 bg-black/50'}
          ${scrollDirection === 'down' && isScrolled ? 'navbar-hidden' : 'navbar-visible'}
        `}>
          <div className="max-w-7xl mx-auto px-6">
            <div className="flex items-center justify-between h-full">
              {/* Logo - Hides on scroll down */}
              <div className={`transition-all duration-300 ${isScrolled && scrollDirection === 'down'
                ? 'opacity-0 scale-75 -translate-y-2'
                : 'opacity-100 scale-100'
                }`}>
                <h1 className="text-2xl md:text-3xl font-black bg-gradient-to-r from-purple-400 via-pink-400 to-purple-500 bg-clip-text text-transparent drop-shadow-2xl">
                  MiniCodeHub
                </h1>
                <p className="text-purple-300 text-xs md:text-sm mt-1 hidden lg:block">Live Code Demos</p>
              </div>

              {/* Search + Filters - Always visible */}
              <div className="flex items-center gap-4 max-w-3xl w-full ml-auto">
                {/* Search */}
                <div className="relative flex-1 max-w-md">
                  <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                  </svg>
                  <input
                    type="text"

                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                  />
                </div>

                {/* 3 Filter Buttons - Glass pill */}
                <div className="flex bg-white/10 backdrop-blur-xl rounded-3xl p-2 border border-white/30 shadow-xl overflow-x-auto hide-scrollbar">
                  <button
                    onClick={() => setFilter('all')}
                    className={`px-5 py-3 rounded-2xl font-bold text-sm transition-all flex items-center gap-2 shadow-md whitespace-nowrap ${filter === 'all'
                      ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white shadow-purple-500/50'
                      : 'text-purple-200 hover:text-white hover:bg-white/30 hover:shadow-lg'
                      }`}
                  >
                    ALL
                    <span className="text-xs bg-black/40 px-2 py-1 rounded-lg min-w-[2.5rem] font-bold">
                      {stats.total}
                    </span>
                  </button>

                  <button
                    onClick={() => setFilter('html')}
                    className={`px-4 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 transition-all whitespace-nowrap ${filter === 'html'
                      ? 'bg-gradient-to-r from-orange-500 to-orange-600 text-white shadow-orange-500/50'
                      : 'text-orange-300 hover:text-orange-100 hover:bg-orange-500/20 hover:shadow-lg'
                      }`}
                  >
                    HTML
                    <span className="text-xs bg-black/40 px-1 py-1 rounded-lg min-w-[2rem]">
                      {stats.html}
                    </span>
                  </button>

                  <button
                    onClick={() => setFilter('reactjs')}
                    className={`px-4 py-3 rounded-2xl font-bold text-sm flex items-center gap-2 transition-all whitespace-nowrap ${filter === 'reactjs'

                      : 'text-emerald-300 hover:text-emerald-100 hover:bg-emerald-500/20 hover:shadow-lg'
                      }`}
                  >
                    React
                    <span className="text-xs bg-black/40 px-1 py-1 rounded-lg min-w-[2rem]">
                      {stats.react}
                    </span>
                  </button>

                  <button
                    onClick={() => setFilter('cpp')}

                      : 'text-blue-300 hover:text-blue-100 hover:bg-blue-500/20 hover:shadow-lg'
                      }`}
                  >

                    <span className="text-xs bg-black/40 px-1 py-1 rounded-lg min-w-[2rem]">

            </div>
          </div>

      );
    }

    function Home() {
      const [videos, setVideos] = useState([]);
      const [search, setSearch] = useState('');
      const [filter, setFilter] = useState('all');
      const [loading, setLoading] = useState(true);
      const [stats, setStats] = useState({ total: 20, html: 14, react: 3, cpp: 3 });
      const [currentPage, setCurrentPage] = useState(1);
      const [totalPages, setTotalPages] = useState(1);
      const [scrollY, setScrollY] = useState(0);
      const [lastScrollY, setLastScrollY] = useState(0);
      const [scrollDirection, setScrollDirection] = useState('up');
      const [isScrolled, setIsScrolled] = useState(false);

      const fetchVideos = useCallback(async () => {
        setLoading(true);
        try {
          const params = new URLSearchParams({
            search,
            lang: filter,
            page: currentPage,
            limit: 20
          });

          console.log('🔄 Fetching:', params.toString());

          const [videosRes, statsRes] = await Promise.all([
            fetch(`/api/videos?${params}`),
            fetch('/api/stats')
          ]);

          if (!videosRes.ok) throw new Error(`Videos fetch failed: ${videosRes.status}`);

          const videoData = await videosRes.json();
          const statsData = statsRes.ok ? await statsRes.json() : {};

          console.log('📊 Page data:', videoData);

          // Handle both array response (old API) and object response (pagination API)
          if (Array.isArray(videoData)) {
            setVideos(videoData);
            setTotalPages(1);
          } else {
            setVideos(videoData.videos || []);
            setTotalPages(videoData.totalPages || 1);
          }

          if (statsData.total) {
            setStats({
              total: statsData.total || 0,
              html: statsData.html || 0,
              react: statsData.react || 0,
              cpp: statsData.cpp || 0
            });
          }
        } catch (error) {
          console.error('Fetch error:', error);
          setVideos([]);
        } finally {
          setLoading(false);
        }
      }, [filter, search, currentPage]);

      // PERFECT NAVBAR SCROLL LOGIC
      useEffect(() => {
        let ticking = false;

        const updateScroll = () => {
          setScrollY(window.scrollY);
          setIsScrolled(window.scrollY > 50);

          if (!ticking) {
            requestAnimationFrame(() => {
              const direction = window.scrollY > lastScrollY ? 'down' : 'up';
              setScrollDirection(direction);
              setLastScrollY(window.scrollY);
              ticking = false;
            });
            ticking = true;
          }
        };

        window.addEventListener('scroll', updateScroll, { passive: true });
        return () => window.removeEventListener('scroll', updateScroll);
      }, [lastScrollY]);

      useEffect(() => {
        console.log('📜 Scrolling to top due to page/filter change');
        window.scrollTo({ top: 0, left: 0, behavior: 'instant' });
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
        fetchVideos();
      }, [currentPage, filter, search, fetchVideos]);

      return (
        <div className="min-h-screen">
          {/* Smart Navbar */}
          <Navbar
            filter={filter}
            setFilter={setFilter}
            search={search}
            setSearch={setSearch}
            stats={stats}
            scrollDirection={scrollDirection}
            isScrolled={isScrolled}
          />

          {/* Main Content */}
          <main className="pt-24 pb-12">
            {/* Filter Status */}
            <div className="max-w-7xl mx-auto px-6 mb-16">
              <h2 className={`inline-flex items-center gap-4 px-8 py-5 rounded-3xl backdrop-blur-xl font-bold text-xl glass shadow-2xl ${filter !== 'all'
                ? 'border-2 border-purple-500/50 bg-purple-500/10'
                : 'border-2 border-transparent'
                }`}>
                <div className={`w-5 h-5 rounded-full shadow-lg ${filter === 'html' ? 'bg-orange-400' :
                  filter === 'react' ? 'bg-emerald-400' :
                    filter === 'cpp' ? 'bg-blue-400' : 'bg-purple-400'
                  }`} />
                {filter.toUpperCase()} ({videos.length} tutorials)
              </h2>
            </div>

            {/* Videos Grid */}
            <div className="max-w-7xl mx-auto px-6">
              {loading ? (
                <div className="flex flex-col items-center py-40">
                  <div className="w-36 h-36 border-8 border-purple-500/20 border-t-purple-500 rounded-full animate-spin mb-16 shadow-2xl"></div>
                  <p className="text-4xl font-bold text-purple-300 tracking-wide">Loading {filter.toUpperCase()} tutorials...</p>
                </div>
              ) : videos.length === 0 ? (
                <div className="text-center py-40 max-w-2xl mx-auto">
                  <div className="w-36 h-36 glass rounded-3xl p-10 mx-auto mb-12 flex items-center justify-center shadow-2xl">
                    <svg className="w-24 h-24 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                  </div>
                  <h2 className="text-5xl font-black text-gray-300 mb-8">No {filter} tutorials</h2>
                  <p className="text-2xl text-gray-400 leading-relaxed">Try switching filters or searching for specific tutorials</p>
                </div>
              ) : (
                <>
                  {/* ✅ TOP PAGINATION BUTTONS */}
                  {totalPages > 1 && (
                    <div className="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-6 bg-white/5 backdrop-blur-xl rounded-3xl p-4 sm:p-8 border border-white/20 shadow-2xl mx-4 sm:mx-0 mb-8">
                      <div className="text-purple-300 font-bold text-base sm:text-xl text-center">
                        Page {currentPage} of {totalPages} • {videos.length} tutorials
                      </div>

                      <div className="flex items-center gap-2 sm:gap-3 flex-wrap justify-center">
                        <button
                          onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                          disabled={currentPage === 1 || loading}
                          className={`px-4 py-2 sm:px-6 sm:py-3 rounded-2xl font-bold text-sm sm:text-lg transition-all shadow-lg flex items-center gap-2 ${currentPage === 1 || loading
                            ? 'bg-gray-700/50 text-gray-400 cursor-not-allowed'
                            : 'bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white shadow-purple-500/50 hover:shadow-xl'
                            }`}
                        >
                          <svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                          Previous
                        </button>

                        {Array.from({ length: Math.min(7, totalPages) }, (_, i) => {
                          const pageNum = currentPage <= 4
                            ? i + 1
                            : currentPage >= totalPages - 3
                              ? totalPages - 6 + i
                              : currentPage - 3 + i;

                          if (pageNum < 1 || pageNum > totalPages) return null;

                          return (
                            <button
                              key={pageNum}
                              onClick={() => setCurrentPage(pageNum)}
                              disabled={loading}
                              className={`hidden sm:flex w-14 h-14 rounded-2xl font-bold text-lg transition-all shadow-lg items-center justify-center ${currentPage === pageNum
                                ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white shadow-purple-500/50 scale-110 ring-4 ring-purple-500/30'
                                : loading
                                  ? 'bg-gray-700/50 text-gray-400 cursor-not-allowed'
                                  : 'bg-white/10 hover:bg-white/20 text-purple-200 hover:text-white hover:shadow-xl hover:scale-105'
                                }`}
                            >
                              {pageNum}
                            </button>
                          );
                        })}

                        <button
                          onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                          disabled={currentPage === totalPages || loading}
                          className={`px-4 py-2 sm:px-6 sm:py-3 rounded-2xl font-bold text-sm sm:text-lg transition-all shadow-lg flex items-center gap-2 ${currentPage === totalPages || loading
                            ? 'bg-gray-700/50 text-gray-400 cursor-not-allowed'
                            : 'bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white shadow-purple-500/50 hover:shadow-xl'
                            }`}
                        >
                          Next
                          <svg className="w-4 h-4 sm:w-5 sm:h-5 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                        </button>
                      </div>
                    </div>
                  )}

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 2xl:grid-cols-4 gap-6">
                    {videos.map(video => {
                      const getCategory = (title) => {
                        const t = title.toLowerCase();
                        if (t.includes('html') || t.includes('css') || t.includes('javascript') || t.includes('js')) return 'html';
                        if (t.includes('react') || t.includes('next') || t.includes('nodejs') || t.includes('tailwind')) return 'react';
                        if (t.includes('c++') || t.includes('cpp')) return 'cpp';
                        return 'html';
                      };

                      const category = getCategory(video.title);
                      const categoryColors = {
                        html: 'orange',
                        react: 'emerald',
                        cpp: 'blue'
                      };

                      return (
                        <Link key={video.id} to={`/video/${video.id}`} className="group block h-full">
                          <div className={`
                          glass rounded-3xl overflow-hidden hover:shadow-2xl hover:-translate-y-4 
                          transition-all duration-700 h-full flex flex-col
                          hover:border-${categoryColors[category]}-400/70
                        `}>
                            <div className="relative overflow-hidden flex-shrink-0 aspect-video bg-gradient-to-br from-gray-900/70 to-black/50">
                              <img
                                src={video.thumbnail.replace('mqdefault.jpg', 'hqdefault.jpg')}
                                alt={video.title}
                                className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"
                                loading="lazy"
                              />
                              <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent/70 opacity-0 group-hover:opacity-100 transition-all duration-500" />
                              <span className={`absolute top-6 left-6 px-5 py-2 backdrop-blur-xl text-white rounded-3xl text-sm font-bold shadow-2xl border-2 border-white/30 font-mono tracking-wide ${category === 'html' ? 'bg-orange-500/95' :
                                category === 'react' ? 'bg-emerald-500/95' :
                                  'bg-blue-500/95'
                                }`}>
                                {category.toUpperCase()}
                              </span>
                            </div>
                            <div className="p-8 flex-1 flex flex-col justify-between">
                              <div>
                                <h3 className="font-black text-xl mb-6 line-clamp-2 group-hover:text-purple-300 transition-all leading-tight tracking-wide">
                                  {video.title}
                                </h3>
                              </div>
                              <div className="mt-auto">
                                <div className="bg-gradient-to-r from-purple-600/95 to-pink-600/95 backdrop-blur-xl text-white font-bold px-8 py-5 rounded-3xl text-center hover:from-purple-700 hover:to-pink-700 hover:shadow-2xl transition-all shadow-xl flex items-center gap-3 justify-center group-hover:scale-[1.02]">
                                  <svg className="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z" />
                                  </svg>
                                  <span className="tracking-wide">Watch + Live Code</span>
                                </div>
                              </div>
                            </div>
                          </div>
                        </Link>
                      );
                    })}
                  </div>

                  {/* ✅ BOTTOM PAGINATION BUTTONS */}
                  {totalPages > 1 && (
                    <div className="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-6 bg-white/5 backdrop-blur-xl rounded-3xl p-4 sm:p-8 border border-white/20 shadow-2xl mx-4 sm:mx-0 mt-8">
                      <div className="text-purple-300 font-bold text-base sm:text-xl text-center">
                        Page {currentPage} of {totalPages} • {videos.length} tutorials
                      </div>

                      <div className="flex items-center gap-2 sm:gap-3 flex-wrap justify-center">
                        <button
                          onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
                          disabled={currentPage === 1 || loading}
                          className={`px-4 py-2 sm:px-6 sm:py-3 rounded-2xl font-bold text-sm sm:text-lg transition-all shadow-lg flex items-center gap-2 ${currentPage === 1 || loading
                            ? 'bg-gray-700/50 text-gray-400 cursor-not-allowed'
                            : 'bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white shadow-purple-500/50 hover:shadow-xl'
                            }`}
                        >
                          <svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                          Previous
                        </button>

                        {Array.from({ length: Math.min(7, totalPages) }, (_, i) => {
                          const pageNum = currentPage <= 4
                            ? i + 1
                            : currentPage >= totalPages - 3
                              ? totalPages - 6 + i
                              : currentPage - 3 + i;

                          if (pageNum < 1 || pageNum > totalPages) return null;

                          return (
                            <button
                              key={pageNum}
                              onClick={() => setCurrentPage(pageNum)}
                              disabled={loading}
                              className={`hidden sm:flex w-14 h-14 rounded-2xl font-bold text-lg transition-all shadow-lg items-center justify-center ${currentPage === pageNum
                                ? 'bg-gradient-to-r from-purple-500 to-pink-500 text-white shadow-purple-500/50 scale-110 ring-4 ring-purple-500/30'
                                : loading
                                  ? 'bg-gray-700/50 text-gray-400 cursor-not-allowed'
                                  : 'bg-white/10 hover:bg-white/20 text-purple-200 hover:text-white hover:shadow-xl hover:scale-105'
                                }`}
                            >
                              {pageNum}
                            </button>
                          );
                        })}

                        <button
                          onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
                          disabled={currentPage === totalPages || loading}
                          className={`px-4 py-2 sm:px-6 sm:py-3 rounded-2xl font-bold text-sm sm:text-lg transition-all shadow-lg flex items-center gap-2 ${currentPage === totalPages || loading
                            ? 'bg-gray-700/50 text-gray-400 cursor-not-allowed'
                            : 'bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white shadow-purple-500/50 hover:shadow-xl'
                            }`}
                        >
                          Next
                          <svg className="w-4 h-4 sm:w-5 sm:h-5 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                        </button>
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          </main >
        </div >
      );
    }

    function VideoDetail() {
      const { id } = useParams();
      const [video, setVideo] = useState(null);
      const navigate = useNavigate();

      useEffect(() => {
        fetch(`/api/video/${id}`).then(res => res.json()).then(setVideo);
      }, [id]);

      if (!video) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-purple-900">
            <div className="animate-spin rounded-full h-32 w-32 border-b-2 border-purple-500"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen pt-24 pb-12 px-6 bg-gradient-to-br from-slate-900 to-purple-900">
          <button
            onClick={() => navigate(-1)}
            className="mb-16 inline-flex items-center gap-3 text-purple-400 hover:text-white font-bold text-xl pb-6 border-b-2 border-transparent hover:border-purple-400 transition-all duration-300"
          >
            <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
            </svg>
            Back to Tutorials
          </button>

          <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-start">
            {/* Video Player */}
            <div>
              <iframe
                src={`https://www.youtube.com/embed/${video.videoId}?rel=0`}
                className="w-full aspect-video rounded-4xl shadow-2xl border-none"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowFullScreen
              />
              <div className="mt-12 p-10 glass rounded-4xl shadow-2xl">
                <h1 className="text-4xl lg:text-5xl font-black mb-8 leading-tight line-clamp-2">{video.title}</h1>
                <div className="flex flex-wrap gap-6 text-xl">
                  <span className="px-6 py-3 bg-purple-500/20 backdrop-blur border border-purple-500/50 rounded-3xl font-bold">
                    {video.channelTitle}
                  </span>
                  <span className="flex items-center gap-3 opacity-80">
                    <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                      <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clipRule="evenodd" />
                    </svg>
                    {new Date(video.publishedAt).toLocaleDateString()}
                  </span>
                </div>
              </div>
            </div>

            {/* Code Editor */}
            <div className="space-y-8">
              <div className="glass p-10 rounded-4xl shadow-2xl">
                <h2 className="text-4xl font-black mb-12 flex items-center gap-6">
                  <svg className="w-16 h-16 text-emerald-400 shadow-2xl" fill="currentColor" viewBox="0 0 20 20">
                    <path fillRule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clipRule="evenodd" />
                  </svg>
                  Live Code Preview
                </h2>

                <div className="grid lg:grid-cols-2 gap-8 h-[600px]">
                  {/* Code */}
                  <div className="glass p-8 rounded-3xl bg-black/30 shadow-xl overflow-auto max-h-[600px]">
                    <pre className="font-mono text-sm leading-relaxed whitespace-pre-wrap">
                      {video.codeData?.code || '// Code loading...'}
                    </pre>
                  </div>

                  {/* Preview */}
                  <div className="glass p-8 rounded-3xl bg-black/20 shadow-xl min-h-0">
                    {video.codeLang === 'html' ? (
                      <iframe
                        srcDoc={video.codeData?.code}
                        className="w-full h-full rounded-3xl border-0 shadow-inner"
                        sandbox="allow-scripts allow-same-origin"
                      />
                    ) : (
                      <div className="h-full flex flex-col items-center justify-center text-center p-16 text-gray-400 bg-gradient-to-br from-gray-900/50 to-black/50 rounded-3xl">
                        <div className="text-6xl mb-8">⚡</div>
                        <div className="text-3xl font-bold mb-6">{video.codeLang?.toUpperCase?.() || 'CODE'}</div>
                        <div className="text-xl opacity-75 max-w-md">Watch the full video tutorial for complete implementation</div>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* Action Buttons */}
              <div className="grid md:grid-cols-2 gap-6">
                <a
                  href={video.videoUrl}
                  target="_blank"
                  className="block bg-gradient-to-r from-emerald-600 via-teal-600 to-emerald-700 hover:from-emerald-700 hover:via-teal-700 hover:to-emerald-800 p-10 rounded-4xl text-2xl font-black text-white text-center shadow-2xl hover:shadow-3xl hover:scale-[1.02] transition-all duration-300 flex items-center justify-center gap-4"
                >
                  <svg className="w-12 h-12" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M21.582,6.186c-0.226-0.861-0.866-1.538-1.714-1.751C18.428,4.326,10,4,10,4s-8.429,0.326-9.868,0.435 c-0.849,0.213-1.489,0.89-1.714,1.751C-0.063,8.45,0.285,12,6,12s6.063-3.55,6-6C12,8.477,12.469,6.657,21.582,6.186z" />
                  </svg>
                  Watch Full Tutorial
                </a>
                <button
                  onClick={() => {
                    navigator.clipboard.writeText(video.videoUrl);
                    // Simple toast effect
                    const toast = document.createElement('div');
                    toast.textContent = '✅ Video link copied!';
                    toast.className = 'fixed top-6 right-6 bg-emerald-500 text-white px-8 py-4 rounded-3xl shadow-2xl z-[9999] animate-slideInRight';
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 3000);
                  }}
                  className="glass p-10 rounded-4xl text-2xl font-bold hover:bg-white/30 hover:shadow-3xl transition-all duration-300 flex items-center justify-center gap-4 shadow-2xl"
                >
                  <svg className="w-12 h-12" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z" />
                  </svg>
                  Copy Link
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Root App
    function App() {
      return (
        <BrowserRouter>
          <Routes>
            <Route path="/" element={<Home />} />
            <Route path="/video/:id" element={<VideoDetail />} />
          </Routes>
        </BrowserRouter>
      );
    }

    // Add toast animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
    `;
    document.head.appendChild(style);

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
